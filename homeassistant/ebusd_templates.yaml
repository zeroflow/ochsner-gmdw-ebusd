# ebusd ↔ Home Assistant: combined set+get number entities
# =========================================================
# One self-contained `template number` per writable datapoint. Each wraps the
# ebusd MQTT-discovery entities into a SINGLE entity that:
#   - reads the live value from the polled  sensor.<...>   (getter)
#   - writes via                            number.<...>   (setter, → bus)
# and imposes a SANE min/max (ebusd derives ±16383.5 from the SIN datatype).
#
# Entity-id scheme (deterministic, pinned via "object_id" in mqtt-hassio.cfg):
#     <domain>.ebusd_<circuit>_<MessageName>_<field>   (lowercased)
#   e.g.  number.ebusd_22102_setkuehlgrenze_temp   (setter)
#         sensor.ebusd_22102_kuehlgrenze_temp      (getter)
#
# IMPORT (HA "packages" — keeps this file self-contained, scales to many files)
#   1. configuration.yaml, once:
#        homeassistant:
#          packages: !include_dir_named packages
#   2. copy this file to  /config/packages/ebusd_templates.yaml  (as-is, `template:` stays).
#   3. Developer Tools → YAML → Check config → then Reload "Template entities"
#      (or restart HA the first time, since the packages: line is new).
#   New domains (sensor:, automation:, …) for the same datapoint can go in THIS file.
#
#   (Note: NOT `template: !include this_file` — that double-nests the `template:` key
#    below and fails. Packages is the include path that keeps the top-level key.)
#
# Prereq: the pinned-id ebusd entities must exist. After enabling object_id you
# must delete the old MQTT device/entities once in HA so they get re-created with
# the new ids (see CLAUDE.md "HA entity-id pinning").

template:
  - number:
      # --- Kühlgrenze / Sollwert Kühlen -------------------------------------
      - name: "Kühlgrenze Sollwert Kühlen"
        unique_id: ebus_22102_kuehlgrenze_combined
        # Attach this template entity to the ebusd "ebusd 22102" device (template
        # helpers are device-less by default). device_id is INSTANCE-SPECIFIC — look
        # it up once: HA → Settings → Devices → "ebusd 22102"; the URL ends in
        # /config/devices/device/<device_id>. Paste that 32-char id below. It stays
        # stable as long as that MQTT device isn't deleted (clearing entity discovery
        # does NOT delete the device). Uncomment + paste the id to attach:
        #device_id: 0123456789abcdef0123456789abcdef
        state: "{{ states('sensor.ebusd_22102_kuehlgrenze_temp') }}"
        availability: "{{ has_value('sensor.ebusd_22102_kuehlgrenze_temp') }}"
        min: 15
        max: 40          # matches the cellar-display UI range for this setpoint
        step: 0.5
        unit_of_measurement: "°C"
        device_class: temperature
        set_value:
          - action: number.set_value
            target:
              entity_id: number.ebusd_22102_setkuehlgrenze_temp
            data:
              value: "{{ value }}"

      # --- next pair goes here ----------------------------------------------
      # Copy the block above, swap the sensor/number entity-ids and min/max.
