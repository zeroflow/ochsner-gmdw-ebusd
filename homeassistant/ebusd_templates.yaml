# ebusd ↔ Home Assistant: combined set+get number entities
# =========================================================
# One self-contained `template number` per writable datapoint. Each wraps the
# ebusd MQTT-discovery entities into a SINGLE entity that:
#   - reads the live value from the polled  sensor.<...>   (getter)
#   - writes via                            number.<...>   (setter, → bus)
# and imposes a SANE min/max (ebusd derives ±16383.5 from the SIN datatype).
#
# Entity-id scheme (what THIS HA actually generates):
#     <domain>.<area>_<device-name>_<slug(message-comment)>   (lowercased)
#   i.e.  slug( "Heating" + "ebusd 22102" + <comment> )
#   NOTE: ebusd publishes "object_id" for clean ids, but this HA ignores it (sticky
#   registry / area folded into the id), so the live ids are name-based as above.
#   Verify a new entity's real id in Developer Tools → States. See CLAUDE.md.
#
# Device binding: a YAML state-based template entity CANNOT be bound to a device
# (`device_id` is rejected by the template schema). After import, assign each entity
# to the "Heating" area in the UI (Settings → Entities → entity → Area), or recreate
# it as a UI Template helper if you truly need it under the device. The raw ebusd
# setters/getters DO sit on the "ebusd 22102" device (setters in the Configuration
# section via entity_category=config in mqtt-hassio.cfg).
#
# IMPORT (HA "packages" — keeps this file self-contained, scales to many files)
#   1. configuration.yaml, once:
#        homeassistant:
#          packages: !include_dir_named packages
#   2. copy this file to  /config/packages/ebusd_templates.yaml  (as-is, `template:` stays).
#   3. Developer Tools → YAML → Check config → then Reload "Template entities"
#      (or restart HA the first time, since the packages: line is new).
#
#   (Note: NOT `template: !include this_file` — that double-nests the `template:` key
#    below and fails. Packages is the include path that keeps the top-level key.)
#
# Prereq: the referenced ebusd sensor/number entities must exist in HA (read sensors
# appear after their first poll, ~2.5 min). Confirm their real ids in Developer Tools.

template:
  - number:
      # --- Kühlgrenze / Sollwert Kühlen -------------------------------------
      - name: "Kühlgrenze Sollwert Kühlen"
        unique_id: ebus_22102_kuehlgrenze_combined
        state: "{{ states('sensor.heating_ebusd_22102_kuhlgrenze_sollwert_kuhlen') }}"
        availability: "{{ has_value('sensor.heating_ebusd_22102_kuhlgrenze_sollwert_kuhlen') }}"
        min: 15
        max: 40          # matches the cellar-display UI range for this setpoint
        step: 0.5
        unit_of_measurement: "°C"
        device_class: temperature
        set_value:
          - action: number.set_value
            target:
              entity_id: number.heating_ebusd_22102_kuhlgrenze_sollwert_kuhlen
            data:
              value: "{{ value }}"

      # --- Raumtemperatur Kühlmodus Tag ------------------------------------
      - name: "Raumtemperatur Kühlmodus Tag"
        unique_id: ebus_22102_kuehlraumtag_combined
        state: "{{ states('sensor.heating_ebusd_22102_raumtemperatur_kuhlmodus_tag') }}"
        availability: "{{ has_value('sensor.heating_ebusd_22102_raumtemperatur_kuhlmodus_tag') }}"
        min: 20
        max: 30          # cellar-display UI range
        step: 0.5
        unit_of_measurement: "°C"
        device_class: temperature
        set_value:
          - action: number.set_value
            target:
              entity_id: number.heating_ebusd_22102_raumtemperatur_kuhlmodus_tag
            data:
              value: "{{ value }}"

      # --- Raumtemperatur Kühlmodus Nacht ----------------------------------
      - name: "Raumtemperatur Kühlmodus Nacht"
        unique_id: ebus_22102_kuehlraumnacht_combined
        state: "{{ states('sensor.heating_ebusd_22102_raumtemperatur_kuhlmodus_nacht') }}"
        availability: "{{ has_value('sensor.heating_ebusd_22102_raumtemperatur_kuhlmodus_nacht') }}"
        min: 20
        max: 30          # cellar-display UI range
        step: 0.5
        unit_of_measurement: "°C"
        device_class: temperature
        set_value:
          - action: number.set_value
            target:
              entity_id: number.heating_ebusd_22102_raumtemperatur_kuhlmodus_nacht
            data:
              value: "{{ value }}"

      # --- next pair goes here ----------------------------------------------
      # Copy a block above, swap the sensor/number entity-ids (slug of the CSV
      # comment — verify in Developer Tools → States) and min/max.
